# Render Blueprint — one-click deploy for the Logistics ERP & CRM stack.
# Docs: https://render.com/docs/blueprint-spec
#
# Usage: in the Render dashboard, click New + -> Blueprint, select this repo.
# Render reads this file and provisions the database + backend + frontend in
# one go. Two env vars (API_URL, CORS_ORIGIN) are intentionally left blank
# (sync: false) because Render only assigns each service's public *.onrender.com
# URL after it's first created — fill them in via the dashboard once, then
# both services will redeploy automatically.

databases:
  - name: logistics-db
    plan: free
    databaseName: logistics_erp
    user: erp
    region: singapore

services:
  - type: web
    name: logistics-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Overrides the public demo password (Admin@123) from prisma/seed.ts.
      # Retrieve this from the Render dashboard (Environment tab) to log in
      # as admin@erp.local the first time — it is never printed to logs.
      - key: SEED_ADMIN_PASSWORD
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false # set after first deploy: https://logistics-web-xxxx.onrender.com
      - key: BASE_CURRENCY
        value: MYR
      # ── Document storage (Sprint 02, see STORAGE.md §3) ──
      # Render's free-tier disk is ephemeral: keep STORAGE_DRIVER=s3 in
      # production and fill the four values from your Cloudflare R2 bucket
      # (Account ID + a bucket-scoped Object Read & Write API token).
      - key: STORAGE_DRIVER
        value: s3
      - key: S3_ENDPOINT
        sync: false # https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      - key: S3_BUCKET
        sync: false # e.g. erp-documents
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info

  - type: web
    name: logistics-web
    runtime: node
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: API_URL
        sync: false # set after first deploy: https://logistics-api-xxxx.onrender.com
      - key: NODE_ENV
        value: production
