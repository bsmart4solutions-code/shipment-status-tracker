name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_ci_pw
          POSTGRES_DB: logistics_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d logistics_erp_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://erp:erp_ci_pw@localhost:5432/logistics_erp_ci?schema=public
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_EXPIRES_IN: 8h
      BASE_CURRENCY: MYR
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          # Next needs a value at build time; not used during static build.
          API_URL: http://localhost:4000
